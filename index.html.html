<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Market Parser</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .price {
            color: #22c55e;
            font-size: 18px;
        }

        button {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

<h1>NFT Продавцы</h1>

<div id="list"></div>

<script>
Telegram.WebApp.expand();

fetch("data.json")
.then(response => response.json())
.then(data => {

    const list = document.getElementById("list");

    data.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h2>${item.nft}</h2>
            <p class="price">${item.price} TON</p>
            <p>Продавец: @${item.username}</p>

            <button onclick="window.open('https://t.me/${item.username}')">
                Написать продавцу
            </button>
        `;

        list.appendChild(card);
    });

})
.catch(() => {
    document.getElementById("list").innerHTML =
        "<h3>Нет данных.</h3>";
});
</script>

</body>
</html>
