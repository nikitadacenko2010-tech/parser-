<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТРАХ ПАРСЕР</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* (Ваши стили остаются без изменений, добавьте только это для корректной работы на мобильных) */
        body {
            background-color: var(--tg-theme-bg-color, #0b0b0f);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        /* Остальные ваши стили... */
    </style>
</head>
<body>

    <div class="welcome-screen" id="welcomeScreen">
        <div class="main-title">ТРАХ ПАРСЕР</div>
        <button class="start-btn" onclick="enterApp()">ВОЙТИ В ЛЕНТУ</button>
    </div>

    <div class="app-screen" id="appScreen" style="display: none; height: 100vh; overflow-y: auto;">
        <div class="screen-header">
            <h2 class="screen-title">⚡ ЛЕНТА МАРКЕТПЛЕЙСА</h2>
        </div>
        
        <div class="feed-container" id="feedContainer"></div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const SERVER_IP = "192.168.1.101"; 
        const SERVER_URL = `http://${SERVER_IP}:8000/api/gifts/all`;
        let displayedGifts = new Set();

        function enterApp() {
            document.getElementById('welcomeScreen').style.transform = 'translateY(-100vh)';
            document.getElementById('appScreen').style.display = 'flex';
            startLiveFeed();
        }

        async function startLiveFeed() {
            const feed = document.getElementById('feedContainer');

            async function fetchLiveUpdates() {
                try {
                    const res = await fetch(SERVER_URL);
                    const allGifts = await res.json();
                    
                    // Обрабатываем новые лоты
                    [...allGifts].reverse().forEach(gift => {
                        const giftKey = `${gift.seller_username}_${gift.number}`;
                        
                        if (!displayedGifts.has(giftKey)) {
                            displayedGifts.add(giftKey);
                            
                            const post = document.createElement('div');
                            post.className = 'post-card';
                            post.innerHTML = `
                                <div class="post-header">
                                    <div class="channel-info">
                                        <div class="channel-avatar">💎</div>
                                        <div class="channel-name">@${gift.seller_username}</div>
                                    </div>
                                </div>
                                <div class="post-content">
                                    <div class="gift-title">🎁 ${gift.gift_name}</div>
                                    <div class="gift-meta">№ ${gift.number}</div>
                                    <div class="gift-price">⭐ ${gift.price} Stars</div>
                                </div>
                                <button class="seller-btn" onclick="tg.openTelegramLink('https://t.me/${gift.seller_username}')">
                                    👤 ПЕРЕЙТИ К ПРОДАВЦУ
                                </button>
                            `;
                            feed.insertBefore(post, feed.firstChild);
                        }
                    });
                } catch (err) {
                    console.error("Ошибка соединения с парсером:", err);
                }
            }

            setInterval(fetchLiveUpdates, 2000);
            fetchLiveUpdates();
        }
    </script>
</body>
</html>
